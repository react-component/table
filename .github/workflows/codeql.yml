name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '53 22 * * 2'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@411bbbe57033eedfc1a82d68c01345aa96c737d7

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          category: '/language:${{ matrix.language }}'
