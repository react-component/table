version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '21:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '21:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - '*'
